spring.application.name=restaurant
server.port=8096

#spring.profiles.active=dev

spring.datasource.url=jdbc:postgresql://localhost:5433/restaurantdb
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# configurations of eureka client registering with the eureka server

eureka.client.serviceUrl.defaultZone: http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#uses the local ip to resolve the dns
eureka.instance.prefer-ip-address=true



#eureka.instance.ip-address=127.0.0.1
#eureka.instance.ip-address=192.168.144.1